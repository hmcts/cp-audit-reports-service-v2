spring:
  application:
    name: cp-audit-reports-service-v2
  jackson:
    deserialization:
      fail-on-null-for-primitives: false
      fail-on-unknown-properties: false

server:
  port: ${SERVER_PORT:8082}
  shutdown: graceful
  http2:
    enabled: true
  forward-headers-strategy: framework   # honor X-Forwarded-* behind proxies
  compression:
    enabled: true
    min-response-size: 2KB
    mime-types: "application/json"

management:
  server:
    # Keep actuator on same port by default; override if you want a separate port
    port: ${MANAGEMENT_SERVER_PORT:${SERVER_PORT:8082}}
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      probes:
        enabled: true                  # liveness/readiness groups
  metrics:
    tags:
      service: service-hmcts-springboot-template
      cluster: ${CLUSTER_NAME:local}
      region: ${REGION:local}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLER_PROBABILITY:1.0}
  otlp:
    metrics:
      export:
        enabled: ${OTEL_METRICS_ENABLED:false}
        url: ${OTEL_METRICS_URL:http://localhost:4318/metrics}
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_TRACES_URL:http://localhost:4318/traces}

azure:
  application-insights:
    instrumentation-key: ${rpe.AppInsightsInstrumentationKey:00000000-0000-0000-0000-000000000000}

jwt:
  # Expose upwards to allow env var override: export JWT_SECRET_KEY=... (base64, 256-bit min)
  secretKey: ${JWT_SECRET_KEY:it-must-be-a-string-secret-at-least-256-bits-long}
  filter:
    enabled: false

service:
  base-url: ${CP_CAR_BASE_URL:http://localhost:8083/}
  token-type: ${CP_TOKEN_TYPE:AZURE}
  cjs-cp-uid: ${CP_CAR_CJSCPPUID_HEADER:CJSCPPUID}
  table:
    endpoint: ${CP_TABLE_ENDPOINT:https://saauditreportstorage.table.core.windows.net}
    sas-token: ${CP_TABLE_SAS_TOKEN:default}
    azure-key: ${CP_AZURE_CREDS_KEY:default}
    azure-name: ${CP_AZURE_CREDS_NAME:default}

  fabric:
    base-url: ${CP_FABRIC_BASE_URL:https://api.fabric.microsoft.com/}
    path: 'v1/workspaces/{WORKSPACE_ID}/items/{ITEM_ID}/jobs/Pipeline/instances'
    workspace-id: '5323aeaf-c852-4a6b-9d37-5acd8cda6b87'
    item-id: '9a13afd6-d911-4845-b7a6-747574908323'
  users:
    path: 'usersgroups-query-api/query/api/rest/usersgroups/users'
    media:
      type: 'application'
      sub-type: 'vnd.usersgroups.search-users+json'
  cases:
    path: 'system-id-mapper-api/rest/systemid/mappings/bulk'
    media:
      type: 'application'
      sub-type: 'vnd.systemid.mappings+json'
  materials:
    path: 'progression-query-api/query/api/rest/progression/materials/cases'
    media:
      type: 'application'
      sub-type: 'vnd.progression.query.material-bulk+json'
  scopes:
    - 'this'
    - 'that'
    - 'other'

logging:
  level:
    root: INFO
  # Use your JSON config (async) — make sure this file exists
  config: classpath:logback.xml