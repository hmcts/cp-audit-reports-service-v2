jar {
  // we dont need jar task which just creates *-plain.jar
  enabled = false
}

bootJar {
  archiveFileName = "${rootProject.name}-${project.version}.jar"

  manifest {
    attributes('Implementation-Version': project.version.toString())
  }
}

tasks.register('openssl', Exec) {
  workingDir 'azurite'
  commandLine 'openssl', 'req', '-newkey', 'rsa:2048', '-x509', '-nodes', '-keyout', 'key.pem', '-new', '-out', 'cert.pem', '-sha256', '-days', '365', '-addext', 'subjectAltName=DNS:azurite', '-subj', '/C=CO/ST=ST/L=LO/O=OR/OU=OU/CN=CN'
}

tasks.named('composeBuild') {
  dependsOn tasks.named('bootJar')
  dependsOn tasks.named('openssl')
}

tasks.withType(AbstractArchiveTask).configureEach {
  preserveFileTimestamps = false
  reproducibleFileOrder = true
}
